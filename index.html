<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wochennummer Widget</title>
    <!-- Einbindung der Schriftart "Inter" von Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            /* height: 100%; */
            overflow: hidden; /* Verhindert Scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
        }

        .wochen-quadrat {
            /* Das Widget füllt den verfügbaren Platz in Notion aus */
            width: 100vw; 
            height: 60vh;
            
            /* Design-Elemente */
            background-color: #DBDBDB; /* Heller Hintergrund wie bei Notion Widgets üblich */
            border: 0px solid #3A3838; /* Minimalistischer Rand */
            border-radius: 0px; /* Leicht abgerundete Ecken für den modernen Look */
            
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Schrift-Einstellungen identisch zu maylie.org */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 700;
            color: #3A3838;
            
            /* Responsive Schriftgröße basierend auf der kleinsten Fensterseite */
            font-size: 22vmin; 
            
            /* Der typische "engere" Look der Schrift */
            letter-spacing: -0.04em; 
            text-align: center;
            white-space: nowrap;
        }

        /* Entfernt jegliche Scrollbar-Reste */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div id="kw-anzeige" class="wochen-quadrat">..</div>

    <script>
        function getKalenderwoche() {
            const heute = new Date();
            // ISO-8601 Berechnung (Wochenstart Montag)
            const d = new Date(Date.UTC(heute.getFullYear(), heute.getMonth(), heute.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        // Anzeige mit "KW" setzen
        document.getElementById('kw-anzeige').innerText = "KW " + getKalenderwoche();
    </script>

</body>
</html>
