<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wochennummer</title>
    <style>
        /* Container, um das Quadrat horizontal zu zentrieren */
        .wrapper {
            display: flex;
            justify-content: center;
            margin-top: 50px; /* Abstand nach oben */
        }

        /* Das Quadrat */
        .wochen-quadrat {
            width: 220px; /* Etwas breiter für den Text "KW" */
            height: 90px;
            border: 0px solid #3A3838;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Jost, "San Francisco", Tahoma, Arial;
            font-size: 4rem; /* Schriftgröße leicht angepasst */
            font-weight: 900;
            color: #3A3838;
            background: #DBDBDB;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="kw-anzeige" class="wochen-quadrat">..</div>
    </div>

    <script>
        function getKalenderwoche() {
            const heute = new Date();
            // ISO-8601 Standard Berechnung
            const d = new Date(Date.UTC(heute.getFullYear(), heute.getMonth(), heute.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        // Zahl mit "KW" Präfix in das HTML-Element schreiben
        document.getElementById('kw-anzeige').innerText = "KW " + getKalenderwoche();
    </script>

</body>
</html>
