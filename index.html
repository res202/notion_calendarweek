<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wochennummer</title>
    <style>
        /* Minimalistisches Design für das Quadrat */
        .wochen-quadrat {
            width: 100px;
            height: 100px;
            border: 2px solid #333; /* Rand */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <!-- Das Quadrat, in dem die Zahl erscheint -->
    <div id="kw-anzeige" class="wochen-quadrat">..</div>

    <script>
        function getKalenderwoche() {
            const heute = new Date();
            // ISO-8601 Wochenberechnung
            const d = new Date(Date.UTC(heute.getFullYear(), heute.getMonth(), heute.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        // Zahl in das HTML-Element schreiben
        document.getElementById('kw-anzeige').innerText = getKalenderwoche();
    </script>

</body>
</html>
