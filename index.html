<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wochennummer Widget</title>
    <style>
        /* Importiert die Jost Font, falls vorhanden, sonst System-Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@900&display=swap');

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Verhindert Scrollbars in Notion unter allen Umständen */
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
        }

        .wochen-quadrat {
            /* Das Quadrat füllt das gesamte Fenster aus */
            width: 100vw;
            height: 100vh;
            
            /* Zentrierung des Textes */
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Designvorgaben */
            background-color: #DBDBDB;
            border: 4px solid #3A3838; /* Rand hinzugefügt wie gewünscht */
            color: #3A3838;
            font-family: 'Jost', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 900;
            
            /* Responsive Schriftgröße: Reagiert auf die kleinere Fensterseite (vmin) */
            font-size: 25vmin; 
            
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="kw-anzeige" class="wochen-quadrat">..</div>

    <script>
        function getKalenderwoche() {
            const heute = new Date();
            // ISO-8601 Standard Berechnung (Woche beginnt Montag)
            const d = new Date(Date.UTC(heute.getFullYear(), heute.getMonth(), heute.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        // Anzeige aktualisieren
        document.getElementById('kw-anzeige').innerText = "KW " + getKalenderwoche();
    </script>

</body>
</html>
